<!DOCTYPE html>
<html>
<head>
  <title>Nick Niziolek - Astrophotography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<pre>
Nick Niziolek - astrophotography
-----------------------
</pre>

<figure class="ascii-frame">
  <figcaption class="ascii-top"></figcaption>
  <div class="ascii-middle">
    <img src="../images/proc_color_small.png" alt="Orion Nebula" id="astro-img">
  </div>
  <figcaption class="ascii-bottom"></figcaption>
  <div class="caption">Orion Nebulae</div>
</figure>

<script>
  const img = document.getElementById('astro-img');
  function drawBorders() {
    const frame = img.closest('.ascii-frame');
    // Each character is 1ch wide; get pixel width and divide
    const charWidth = parseFloat(getComputedStyle(document.body).fontSize) * 0.6; // approx monospace char width
    const imgWidth = img.offsetWidth;
    const cols = Math.round(imgWidth / charWidth);
    const top = '+' + '-'.repeat(cols) + '+';
    frame.querySelector('.ascii-top').textContent = top;
    frame.querySelector('.ascii-bottom').textContent = top;
  }
  img.addEventListener('load', drawBorders);
  window.addEventListener('resize', drawBorders);
  if (img.complete) drawBorders();
</script>

</body>
</html>
